name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for MCP Registry OIDC auth
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run build

      - name: Check if version is new
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "new=false" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION already published, skipping"
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.new == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        if: steps.check.outputs.new == 'true'
        run: curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Sync server.json version to package.json
        if: steps.check.outputs.new == 'true'
        run: |
          V="${{ steps.check.outputs.version }}"
          jq --arg v "$V" '.version = $v | .packages = [.packages[] | .version = $v]' server.json > server.tmp && mv server.tmp server.json

      - name: Authenticate to MCP Registry (OIDC)
        if: steps.check.outputs.new == 'true'
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        if: steps.check.outputs.new == 'true'
        run: ./mcp-publisher publish
